name: Feature request
description: Suggest an improvement or new behavior.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What friction do you hit today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Areas affected (optional)
      description: e.g. desktop loop, runner, errand minigame, worker/leaderboards, tooling.
    validations:
      required: false
