name: Bug report
description: Something is broken or incorrect in Bug Detective.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Prefer **minimal repro steps** when possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment (optional but helpful)
      description: Browser, OS, npm/node versions, URL (local/live), puzzle/minigame.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / console errors / logs (optional)
    validations:
      required: false
